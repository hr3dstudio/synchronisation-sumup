databases:
  - name: sumup-shopify-sync-db
    databaseName: sumup_shopify_sync
    user: sumup_shopify_sync

services:
  - type: web
    name: sumup-shopify-sync
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_products,read_inventory,write_inventory,read_locations
      - key: DATABASE_URL
        fromDatabase:
          name: sumup-shopify-sync-db
          property: connectionString
      - key: SUMUP_API_KEY
        sync: false
      - key: SUMUP_MERCHANT_CODE
        sync: false
      - key: SUMUP_SYNC_PAYMENT_TYPES
        value: POS,CASH
      - key: CRON_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DRY_RUN
        value: "true"
      - key: SYNC_LOOKBACK_MINUTES
        value: "15"
      - key: AUTO_RESTOCK_FULL_REFUNDS
        value: "false"

  - type: cron
    name: sumup-shopify-sync-cron
    runtime: docker
    schedule: "*/15 * * * *"
    dockerCommand: "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" \"$SHOPIFY_APP_URL/api/cron/sumup-sync\""
    envVars:
      - key: SHOPIFY_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

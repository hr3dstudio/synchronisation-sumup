services:
  - type: web
    name: sumup-shopify-sync
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_products,read_inventory,write_inventory,read_locations
      - key: DATABASE_URL
        sync: false
      - key: SUMUP_API_KEY
        sync: false
      - key: SUMUP_MERCHANT_CODE
        sync: false
      - key: SUMUP_SYNC_PAYMENT_TYPES
        value: POS,CASH
      - key: CRON_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: DRY_RUN
        value: "true"
      - key: SYNC_LOOKBACK_MINUTES
        value: "15"
      - key: AUTO_RESTOCK_FULL_REFUNDS
        value: "false"
